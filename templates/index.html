<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title id="pg-title">Organic Foods</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --t:#C27A0A;--tl:#C27A0A15;--t2:#C27A0A30;--ts:#FDF3DC;
  --bg:#F6F7FB;--bg2:#EDEEF5;--bg3:#E5E6EF;
  --card:#FFFFFF;--border:#00000010;--border2:#00000018;
  --text:#191B2A;--sub:#52566B;--muted:#9498AD;--r:12px;
  --sh:0 1px 8px #00000009;--sh2:0 6px 28px #00000014;
}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .5s}
.orb{font-family:'Orbitron',monospace}
button{cursor:pointer;font-family:inherit;transition:.15s all;border:none;outline:none}
input,textarea,select{background:var(--card);border:1.5px solid var(--border2);color:var(--text);border-radius:9px;padding:10px 13px;font-family:inherit;font-size:14px;outline:none;width:100%;transition:.18s}
input:focus,textarea:focus{border-color:var(--t);box-shadow:0 0 0 3px var(--tl)}
input[type=color]{width:44px;height:40px;padding:3px;cursor:pointer;border-radius:7px}
input[type=checkbox]{width:auto;accent-color:var(--t)}
textarea{resize:vertical}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--t);border-radius:4px}::-webkit-scrollbar-track{background:var(--bg2)}
.card{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);box-shadow:var(--sh)}
.hidden{display:none!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes zoomIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes slideR{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.fadeUp{animation:fadeUp .3s ease both}
.zoomIn{animation:zoomIn .22s ease both}



/* Toast */
#toast{position:fixed;bottom:18px;right:18px;z-index:9000;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.ti{padding:11px 17px;border-radius:9px;font-weight:600;font-size:13px;animation:slideR .24s ease;box-shadow:0 6px 22px #00000018}
.ti-ok{background:var(--t);color:#fff}
.ti-err{background:#DC2626;color:#fff}

/* Nav */
nav{position:sticky;top:0;z-index:200;background:#FFFFFFF2;backdrop-filter:blur(20px);border-bottom:1.5px solid var(--border2)}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;height:60px;padding:0 24px;gap:12px}
.nav-logo{display:flex;align-items:center;gap:10px;background:none;cursor:pointer;padding:0}
.nav-mark{width:32px;height:32px;border-radius:8px;background:var(--t);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;color:#fff;font-weight:700;font-size:13px;font-family:'Orbitron',monospace}
.nav-mark img{width:100%;height:100%;object-fit:cover}
.nav-name{font-family:'Orbitron',monospace;color:var(--text);font-size:13px;letter-spacing:2px;font-weight:700}
.nav-sp{flex:1}
.nb{background:none;border:1.5px solid transparent;color:var(--sub);padding:7px 15px;border-radius:8px;font-size:13px;font-weight:600}
.nb:hover{background:var(--bg2);color:var(--text)}
.nb.on{background:var(--ts);border-color:var(--t2);color:var(--t)}
.nb-cart{position:relative;padding:7px 14px}
.cart-pip{position:absolute;top:-1px;right:-1px;background:var(--t);color:#fff;min-width:16px;height:16px;border-radius:8px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px}

/* Page */
.page{max-width:1200px;margin:0 auto;padding:30px 22px;min-height:calc(100vh - 60px)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:9px;font-weight:600;font-size:14px;cursor:pointer;transition:.15s}
.btn:hover{transform:translateY(-1px)}
.btn-p{background:var(--t);color:#fff;box-shadow:0 3px 10px var(--t2)}
.btn-p:hover{filter:brightness(1.07)}
.btn-g{background:none;border:1.5px solid var(--border2);color:var(--sub)}
.btn-g:hover{border-color:var(--t);color:var(--t);background:var(--tl)}
.btn-wa{background:#DCFCE7;border:1.5px solid #16A34A40;color:#15803D}
.btn-ph{background:var(--ts);border:1.5px solid var(--t2);color:var(--t)}
.btn-em{background:#EFF6FF;border:1.5px solid #2563EB33;color:#1D4ED8}
.btn-red{background:#FEF2F2;border:1.5px solid #DC262630;color:#DC2626}

/* Tags */
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:700;margin:2px;letter-spacing:.3px}
.t-p{background:var(--ts);border:1px solid var(--t2);color:var(--t)}
.t-g{background:#F0FDF4;border:1px solid #16A34A30;color:#15803D}
.t-b{background:#EFF6FF;border:1px solid #2563EB30;color:#1D4ED8}
.t-r{background:#FEF2F2;border:1px solid #DC262630;color:#DC2626}
.t-n{background:var(--bg2);border:1px solid var(--border2);color:var(--sub)}

/* Hero */
.hero{text-align:center;padding:58px 20px 48px;position:relative;overflow:hidden;margin-bottom:26px;background:linear-gradient(160deg,var(--ts) 0%,var(--bg) 55%);border-radius:14px;border:1.5px solid var(--t2)}
.hero-rule{width:44px;height:3px;background:var(--t);border-radius:2px;margin:0 auto 18px}
.hero-eyebrow{font-family:'Orbitron',monospace;font-size:10px;font-weight:600;letter-spacing:5px;color:var(--t);margin-bottom:14px;display:block}
.hero-logo{width:62px;height:62px;border-radius:13px;object-fit:contain;display:block;margin:0 auto 14px;border:1.5px solid var(--t2);box-shadow:var(--sh2)}
.hero h1{font-size:clamp(24px,5vw,46px);font-weight:700;color:var(--text);line-height:1.1;margin-bottom:11px}
.hero p{color:var(--sub);font-size:15px;max-width:400px;margin:0 auto 26px;line-height:1.65}
.hero-btns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}

/* Toolbar */
.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.srch{flex:1;min-width:175px;position:relative}
.srch input{padding-left:36px;background:var(--card)}
/* CSS search icon */
.srch::before{content:'';position:absolute;left:12px;top:50%;transform:translateY(-50%);width:13px;height:13px;border-radius:50%;border:2px solid var(--muted);z-index:1;pointer-events:none}
.srch::after{content:'';position:absolute;left:22px;top:50%;margin-top:4px;width:5px;height:2px;background:var(--muted);transform:rotate(45deg);border-radius:1px;z-index:1;pointer-events:none}
.cats{display:flex;gap:6px;flex-wrap:wrap}
.cat{padding:7px 14px;border-radius:8px;border:1.5px solid var(--border2);background:var(--card);color:var(--sub);font-weight:600;font-size:13px;cursor:pointer;transition:.14s;box-shadow:var(--sh)}
.cat:hover{border-color:var(--t);color:var(--t)}
.cat.on{border-color:var(--t);background:var(--ts);color:var(--t)}

/* Product grid */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(262px,1fr));gap:17px}
.pcard{border-radius:var(--r);overflow:hidden;border:1.5px solid var(--border2);background:var(--card);transition:.2s all;box-shadow:var(--sh)}
.pcard:hover{border-color:var(--t);transform:translateY(-4px);box-shadow:var(--sh2)}
.pcard.feat{border-color:var(--t2)}
.pcard-media{height:155px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:var(--bg)}
.pcard-media img{width:100%;height:100%;object-fit:cover}
.pcard-ph{width:54px;height:54px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:var(--muted)}
.badges-r{position:absolute;top:9px;right:9px;display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.badges-l{position:absolute;top:9px;left:9px;display:flex;flex-direction:column;gap:4px}
.disc-bar{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,#DC262666,transparent);padding:5px 10px;font-size:11px;font-weight:700;color:#FCA5A5;letter-spacing:.4px}
.pcard-body{padding:16px 17px}
.pcard-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;min-height:20px}
.pcard-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:5px;background:rgba(255,255,255,0.85);display:inline-block;padding:2px 6px;border-radius:4px}
.pcard-desc{color:var(--sub);font-size:13px;line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;background:rgba(255,255,255,0.75);padding:4px 6px;border-radius:4px}
.price-row{display:flex;align-items:center;gap:7px;margin-bottom:11px;flex-wrap:wrap}
.p-price{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:var(--t)}
.p-orig{font-size:12px;color:var(--muted);text-decoration:line-through}
.p-disc{font-size:11px;font-weight:700;color:#DC2626;background:#FEF2F2;padding:2px 7px;border-radius:100px}
.p-stock{color:var(--muted);font-size:12px;margin-left:auto}
.pcard-acts{display:flex;gap:7px}
.btn-ac{flex:1;padding:9px;background:var(--t);color:#fff;font-weight:700;font-size:13px;border-radius:8px;box-shadow:0 2px 8px var(--t2);transition:.14s}
.btn-ac:hover{filter:brightness(1.07)}
.btn-ac:disabled{opacity:.42;cursor:not-allowed;transform:none;box-shadow:none}
.btn-vw{padding:9px 11px;background:var(--bg);border:1.5px solid var(--border2);color:var(--sub);border-radius:8px;font-size:12px;font-weight:600}
.btn-vw:hover{border-color:var(--t);color:var(--t);background:var(--ts)}

/* Empty */
.empty{padding:68px 30px;text-align:center}
.empty-box{width:52px;height:52px;border-radius:12px;background:var(--bg2);margin:0 auto 14px;display:flex;align-items:center;justify-content:center}
.empty-box-inner{width:22px;height:22px;border-radius:4px;background:var(--bg3)}
.empty h3{color:var(--text);font-size:16px;font-weight:700;margin-bottom:7px}
.empty p{color:var(--sub);font-size:14px;margin-bottom:18px;line-height:1.6}

/* Footer */
.foot{margin-top:50px;background:var(--card);border:1.5px solid var(--border2);border-radius:var(--r);padding:22px 26px;display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;box-shadow:var(--sh)}
.foot-name{font-family:'Orbitron',monospace;font-size:12px;letter-spacing:2px;font-weight:700;margin-bottom:4px}
.foot-addr{color:var(--sub);font-size:13px}
.foot-links{display:flex;gap:8px;flex-wrap:wrap}

/* Detail */
.back{display:flex;align-items:center;gap:7px;background:none;color:var(--sub);font-size:14px;margin-bottom:20px;padding:0;font-weight:600}
.back:hover{color:var(--t)}
/* CSS back arrow */
.back-ic{width:16px;height:16px;position:relative;display:inline-flex;align-items:center;flex-shrink:0}
.back-ic::before{content:'';position:absolute;left:1px;width:7px;height:7px;border-left:2px solid currentColor;border-bottom:2px solid currentColor;transform:rotate(45deg) translate(1px,-1px)}
.back-ic::after{content:'';position:absolute;left:0;right:0;height:2px;background:currentColor;border-radius:1px}
.det-card{overflow:hidden}
.det-media{height:255px;display:flex;align-items:center;justify-content:center;background:var(--bg);overflow:hidden}
.det-media img{width:100%;height:100%;object-fit:cover}
.det-ph{width:76px;height:76px;border-radius:14px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:var(--muted)}
.det-body{padding:30px}
.det-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:11px}
.det-name{font-size:clamp(19px,4vw,28px);font-weight:700;color:var(--text);margin-bottom:13px}
.det-price-row{display:flex;align-items:center;gap:11px;margin-bottom:13px;flex-wrap:wrap}
.det-price{font-family:'Orbitron',monospace;font-size:26px;font-weight:700;color:var(--t)}
.det-desc{color:var(--sub);font-size:15px;line-height:1.7;margin-bottom:7px}
.det-stock{color:var(--muted);font-size:13px;margin-bottom:24px}
.det-acts{display:flex;gap:9px;flex-wrap:wrap}

/* Cart */
.cart-hd{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.cart-ttl{font-family:'Orbitron',monospace;font-size:17px;letter-spacing:1px}
.cart-bdg{background:var(--ts);border:1.5px solid var(--t2);color:var(--t);padding:3px 11px;border-radius:7px;font-size:12px;font-weight:700}
.citem{padding:13px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.citem:hover{border-color:var(--t2)}
.citem-th{width:48px;height:48px;background:var(--bg);border-radius:9px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1.5px solid var(--border2);flex-shrink:0;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--muted)}
.citem-th img{width:100%;height:100%;object-fit:cover}
.citem-info{flex:1;min-width:90px}
.citem-name{font-weight:700;color:var(--text);font-size:14px;margin-bottom:3px}
.citem-sub{color:var(--sub);font-size:12px}
.qty-row{display:flex;align-items:center;gap:7px}
.qb{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:600}
.qb:hover{border-color:var(--t);color:var(--t);background:var(--ts)}
.qn{font-weight:700;min-width:20px;text-align:center;font-size:14px}
.citem-tot{font-family:'Orbitron',monospace;font-weight:700;min-width:85px;text-align:right;font-size:13px;color:var(--t)}
.rm{width:29px;height:29px;background:#FEF2F2;border:1.5px solid #DC262626;color:#DC2626;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:400;cursor:pointer}
.csumm{padding:21px;background:var(--ts);border-color:var(--t2)}
.sum-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.sum-tot{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:var(--t)}
.order-stack{display:flex;flex-direction:column;gap:8px}
.o-wa{width:100%;padding:13px;background:#15803D;color:#fff;font-weight:700;font-size:14px;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;box-shadow:0 3px 12px #15803D20}
.o-wa:hover{background:#166534}
.o-ph,.o-em{width:100%;padding:10px;font-weight:600;font-size:13px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.o-ph{background:var(--card);border:1.5px solid var(--t2);color:var(--t)}
.o-em{background:var(--card);border:1.5px solid #2563EB30;color:#1D4ED8}

/* Admin login */
.adm-login{max-width:390px;margin:80px auto}
.adm-lcard{padding:40px;text-align:center}
.adm-licon{width:54px;height:54px;border-radius:13px;background:var(--ts);border:1.5px solid var(--t2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.adm-licon-in{width:20px;height:20px;border-radius:4px;background:var(--t);opacity:.7}

/* Admin panel */
.adm-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.adm-ttl{font-family:'Orbitron',monospace;font-size:16px;letter-spacing:2px}
.adm-tabs{display:flex;border-bottom:2px solid var(--border2);margin-bottom:20px;overflow-x:auto}
.atab{padding:9px 19px;background:none;border:none;border-bottom:2px solid transparent;color:var(--sub);font-weight:600;font-size:13px;cursor:pointer;transition:.14s;margin-bottom:-2px;white-space:nowrap}
.atab:hover{color:var(--text)}
.atab.on{border-bottom-color:var(--t);color:var(--t)}
.stats-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:9px;margin-bottom:20px}
.scard{padding:16px;text-align:center}
.sval{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;margin-bottom:4px;color:var(--t)}
.slbl{color:var(--muted);font-size:10px;font-weight:700;letter-spacing:1.5px}

/* Product list admin */
.ap{padding:12px 16px;display:flex;align-items:center;gap:11px;flex-wrap:wrap;margin-bottom:7px}
.ap:hover{border-color:var(--t2)}
.ap-th{width:40px;height:40px;background:var(--bg);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1.5px solid var(--border2);flex-shrink:0;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--muted)}
.ap-th img{width:100%;height:100%;object-fit:cover}
.ap-info{flex:1;min-width:80px}
.ap-name{font-weight:700;color:var(--text);font-size:14px}
.ap-meta{color:var(--muted);font-size:12px;margin-top:2px}
.ap-price{font-family:'Orbitron',monospace;font-weight:700;font-size:13px;color:var(--t)}
.ap-btns{display:flex;gap:6px}

/* Form */
.fpanel{padding:21px;margin-bottom:15px;border-color:var(--t2);background:var(--bg)}
.ftitle{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:1px;margin-bottom:16px;color:var(--t)}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px}
.fw{grid-column:1/-1}
.fl{display:flex;flex-direction:column;gap:4px}
.fl label{color:var(--sub);font-size:12px;font-weight:600}
.hint{color:var(--muted);font-size:11px;margin-top:2px}
.factions{display:flex;gap:8px;margin-top:15px}
.err-txt{color:#DC2626;font-size:13px;margin-top:4px}

/* Upload */
.urow{display:flex;align-items:center;gap:13px;flex-wrap:wrap}
.uprev{width:56px;height:56px;border-radius:9px;border:1.5px solid var(--border2);background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--muted)}
.uprev img{width:100%;height:100%;object-fit:contain}
.ubtn{padding:7px 13px;background:var(--ts);border:1.5px solid var(--t2);color:var(--t);border-radius:7px;font-size:12px;font-weight:600;cursor:pointer}
.ubtn:hover{background:var(--t);color:#fff}
.urbtn{padding:7px 12px;background:#FEF2F2;border:1.5px solid #DC262628;color:#DC2626;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer}

/* Settings */
.spanel{padding:24px}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.cdots{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.cdot{width:25px;height:25px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:.14s}
.cdot.sel{border-color:var(--text);transform:scale(1.1)}

/* Carts */
.uc{padding:19px;margin-bottom:10px}
.uc-hd{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:7px;margin-bottom:11px}
.uc-av{width:30px;height:30px;background:var(--ts);border:1.5px solid var(--t2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;color:var(--t);flex-shrink:0}
.uc-row{display:flex;align-items:center;gap:9px;padding:7px 11px;background:var(--bg);border-radius:7px;margin-bottom:5px;border:1px solid var(--border)}

@media(max-width:600px){
  .page{padding:14px 12px}
  .hero{padding:34px 13px 26px}
  .atab{padding:9px 12px;font-size:12px}
  .det-body{padding:17px}
  .spanel,.fpanel{padding:15px}
}
</style>
</head>
<body>

<!-- Toast -->
<div id="toast"></div>

<!-- Navbar — no Admin button -->
<nav id="navbar" class="hidden">
  <div class="nav-inner">
    <button class="nav-logo" onclick="goPage('store')">
      <div class="nav-mark" id="nav-mark">N</div>
      <span class="nav-name orb" id="nav-name">ORGANIC FOODS</span>
    </button>
    <div class="nav-sp"></div>
    <button class="nb" id="nb-store" onclick="goPage('store')">Store</button>
    <button class="nb nb-cart" id="nb-cart" onclick="goPage('cart')">
      Cart<span id="cart-pip" class="cart-pip hidden">0</span>
    </button>
  </div>
</nav>

<!-- Store Page -->
<div class="page hidden" id="pg-store">
  <div class="hero fadeUp">
    <div class="hero-rule"></div>
    <div id="hero-logo-slot"></div>
    <span class="hero-eyebrow" id="hero-eyebrow">PREMIUM COLLECTION</span>
    <h1 id="hero-title">Organic Foods</h1>
    <p id="hero-sub">Where Innovation Meets Commerce</p>
    <div class="hero-btns">
      <button class="btn btn-wa" onclick="doWa()">WhatsApp</button>
      <button class="btn btn-ph" onclick="doPhone()">Call Us</button>
      <button class="btn btn-em" onclick="doEmail()">Email Us</button>
    </div>
  </div>

  <div class="toolbar fadeUp">
    <div class="srch">
      <input type="text" id="srch-in" placeholder="Search products..." oninput="doSearch(this.value)"/>
    </div>
    <div class="cats" id="cats"></div>
  </div>

  <div class="pgrid" id="pgrid"></div>

  <div class="foot fadeUp">
    <div>
      <div class="foot-name orb" id="sf-name"></div>
      <div class="foot-addr" id="sf-addr"></div>
    </div>
    <div class="foot-links">
      <button class="btn btn-wa" onclick="doWa()" id="sf-wa">WhatsApp</button>
      <button class="btn btn-ph" onclick="doPhone()" id="sf-ph">Call</button>
      <button class="btn btn-em" onclick="doEmail()" id="sf-em">Email</button>
    </div>
  </div>
</div>

<!-- Product Detail -->
<div class="page hidden" id="pg-product">
  <button class="back" onclick="goPage('store')"><span class="back-ic"></span> Back to Store</button>
  <div class="card det-card fadeUp">
    <div class="det-media" id="d-media"></div>
    <div class="det-body">
      <div class="det-tags" id="d-tags"></div>
      <div class="det-name" id="d-name"></div>
      <div class="det-price-row">
        <div class="det-price" id="d-price"></div>
        <div id="d-orig" style="font-size:14px;color:var(--muted);text-decoration:line-through;display:none"></div>
        <div id="d-save" class="tag t-r" style="display:none"></div>
      </div>
      <div class="det-desc" id="d-desc"></div>
      <div class="det-stock" id="d-stock"></div>
      <div class="det-acts">
        <button class="btn btn-p" style="flex:1;max-width:175px;justify-content:center;padding:12px;font-size:15px" id="d-add">Add to Cart</button>
        <button class="btn btn-wa" onclick="doWa()">Order via WhatsApp</button>
        <button class="btn btn-em" onclick="doEmail()">Email Enquiry</button>
      </div>
    </div>
  </div>
</div>

<!-- Cart -->
<div class="page hidden" id="pg-cart">
  <div class="cart-hd">
    <div class="cart-ttl orb">Cart</div>
    <span class="cart-bdg hidden" id="cart-bdg"></span>
  </div>
  <div id="cart-body"></div>
</div>

<!-- Admin — accessible only via /admin URL -->
<div class="page hidden" id="pg-admin">
  <div id="adm-login" class="adm-login">
    <div class="card adm-lcard zoomIn">
      <div class="adm-licon"><div class="adm-licon-in"></div></div>
      <div class="orb" style="color:var(--t);font-size:15px;letter-spacing:2px;margin-bottom:8px">ADMIN ACCESS</div>
      <p style="color:var(--sub);font-size:13px;margin-bottom:20px;line-height:1.6">Enter your password to manage the store</p>
      <input type="password" id="adm-pass" placeholder="Password" style="text-align:center;margin-bottom:10px" onkeydown="if(event.key==='Enter')adminLogin()"/>
      <div class="err-txt hidden" id="adm-err">Incorrect password.</div>
      <button class="btn btn-p" style="width:100%;justify-content:center;margin-top:12px;padding:12px;font-size:15px" onclick="adminLogin()">Login</button>
    </div>
  </div>
  <div id="adm-panel" class="hidden">
    <div class="adm-top fadeUp">
      <div>
        <div class="adm-ttl orb">Admin Panel</div>
        <div style="color:var(--sub);font-size:13px;margin-top:3px" id="adm-sub"></div>
      </div>
      <button class="btn btn-red" onclick="adminLogout()">Logout</button>
    </div>
    <div class="stats-g fadeUp" id="stats-g"></div>
    <div class="adm-tabs fadeUp">
      <button class="atab on" id="tab-products" onclick="setTab('products')">Products</button>
      <button class="atab" id="tab-settings" onclick="setTab('settings')">Settings</button>
      <button class="atab" id="tab-carts"    onclick="setTab('carts')">User Carts</button>
    </div>
    <div id="tab-body" class="fadeUp"></div>
  </div>
</div>

<script>
const S={
  settings:{name:'Organic Foods',tagline:'',phone:'',whatsapp:'',address:'',email:'',theme:'#C27A0A',currency:'',logo:''},
  products:[],cart:[],user:null,
  page:'store',adminLoggedIn:false,adminTab:'products',
  selProd:null,search:'',cat:'All',
  adminCarts:[],editProd:null,showForm:false,
};
const IS_ADMIN=window.location.pathname==='/admin';
const sid=localStorage.getItem('nx-sid')||(()=>{const id=([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16));localStorage.setItem('nx-sid',id);return id;})();

async function api(method,path,body){
  const o={method,headers:{'Content-Type':'application/json'},credentials:'include'};
  if(body!==undefined)o.body=JSON.stringify(body);
  try{const r=await fetch('/api'+path,o);return await r.json();}catch{return{error:'Network error'};}
}

async function init(){
  const[settings,products]=await Promise.all([api('GET','/settings'),api('GET','/products')]);
  S.settings=settings;S.products=products;
  applyTheme(settings.theme);
  const ac=await api('GET','/admin/check');S.adminLoggedIn=ac.admin;
  // Silent user — no prompt
  const uid=localStorage.getItem('nx-uid');
  const u=await api('POST','/users',{session_id:sid,name:localStorage.getItem('nx-name')||'Guest'});
  if(u.id){S.user=u;localStorage.setItem('nx-uid',u.id);localStorage.setItem('nx-name',u.name);await loadCart();}
  showNav();
  if(IS_ADMIN)S.page='admin';
  render();
}

function showNav(){document.getElementById('navbar').classList.remove('hidden');updNav();}
async function loadCart(){
  if(!S.user)return;
  const c=await api('GET','/cart/'+S.user.id);
  S.cart=Array.isArray(c)?c:[];updNav();
}

function applyTheme(hex){
  if(!/^#[0-9A-Fa-f]{6}$/.test(hex))return;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  // Darken for contrast on white cards
  const dk=v=>Math.max(0,Math.round(v*.78));
  const dark=`#${dk(r).toString(16).padStart(2,'0')}${dk(g).toString(16).padStart(2,'0')}${dk(b).toString(16).padStart(2,'0')}`;
  // Subtle tinted background
  const br=Math.round(246*.97+r*.03),bg_=Math.round(247*.97+g*.03),bb=Math.round(251*.97+b*.03);
  const rt=document.documentElement;
  rt.style.setProperty('--t',dark);
  rt.style.setProperty('--tl',hex+'15');
  rt.style.setProperty('--t2',hex+'30');
  rt.style.setProperty('--ts',hex+'11');
  rt.style.setProperty('--bg',`rgb(${br},${bg_},${bb})`);
  rt.style.setProperty('--bg2',`rgb(${Math.round(br*.97)},${Math.round(bg_*.97)},${Math.round(bb*.97)})`);
}

function updNav(){
  const nm=S.settings.name;
  document.getElementById('nav-name').textContent=nm.toUpperCase();
  document.getElementById('pg-title').textContent=nm;
  const mk=document.getElementById('nav-mark');
  if(S.settings.logo&&S.settings.logo.length>4)mk.innerHTML=`<img src="${S.settings.logo}" alt=""/>`;
  else mk.textContent=(nm[0]||'N').toUpperCase();
  ['store','cart'].forEach(p=>document.getElementById('nb-'+p)?.classList.toggle('on',S.page===p));
  const cnt=S.cart.reduce((s,i)=>s+i.quantity,0);
  const pip=document.getElementById('cart-pip');pip.textContent=cnt;pip.classList.toggle('hidden',cnt===0);
  const bdg=document.getElementById('cart-bdg');
  if(bdg){bdg.textContent=cnt+' item'+(cnt!==1?'s':'');bdg.classList.toggle('hidden',cnt===0);}
}

function goPage(p){
  S.page=p;S.editProd=null;S.showForm=false;
  if(p==='admin'&&window.location.pathname!=='/admin')window.history.pushState({},'','/admin');
  else if(p!=='admin'&&window.location.pathname==='/admin')window.history.pushState({},'','/');
  updNav();render();window.scrollTo({top:0,behavior:'smooth'});
}
window.addEventListener('popstate',()=>{S.page=window.location.pathname==='/admin'?'admin':'store';updNav();render();});

function render(){
  ['store','product','cart','admin'].forEach(p=>document.getElementById('pg-'+p).classList.toggle('hidden',p!==S.page));
  if(S.page==='store')   rStore();
  if(S.page==='product') rDetail();
  if(S.page==='cart')    rCart();
  if(S.page==='admin')   rAdmin();
}

const cur=()=>S.settings.currency||'';
const fmt=n=>`${cur()}${Number(n).toLocaleString()}`;
const dp=(price,d)=>d>0?price*(1-d/100):price;
function tCls(t){const tl=t.toLowerCase();if(tl.includes('sale')||tl.includes('off'))return't-r';if(tl.includes('new'))return't-b';if(tl.includes('best')||tl.includes('feat')||tl.includes('popular'))return't-g';return't-n';}
function rTags(str){if(!str)return'';return str.split(',').map(t=>t.trim()).filter(Boolean).map(t=>`<span class="tag ${tCls(t)}">${t}</span>`).join('');}
function initLetter(n){return(n||'?')[0].toUpperCase();}
function pMedia(p,cls='pcard-ph'){if(p.photo&&p.photo.length>4)return`<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover" alt="${p.name}"/>`;return`<div class="${cls}">${initLetter(p.name)}</div>`;}

function rStore(){
  const s=S.settings;
  document.getElementById('hero-title').textContent=s.name;
  document.getElementById('hero-sub').textContent=s.tagline;
  document.getElementById('sf-name').textContent=s.name;
  document.getElementById('sf-addr').textContent=s.address;
  applyTheme(s.theme);
  const hs=document.getElementById('hero-logo-slot');
  hs.innerHTML=s.logo&&s.logo.length>4?`<img src="${s.logo}" class="hero-logo" alt="logo" style="width:60px;height:60px;border-radius:12px;object-fit:contain;display:block;margin:0 auto 14px;border:1.5px solid var(--t2)"/>`:'' ;
  const cats=['All',...new Set(S.products.map(p=>p.category))];
  document.getElementById('cats').innerHTML=cats.map(c=>`<button class="cat${S.cat===c?' on':''}" onclick="doCat('${c}')">${c}</button>`).join('');
  const fl=S.products.filter(p=>{
    const mc=S.cat==='All'||p.category===S.cat;
    const ms=!S.search||[p.name,p.description,p.tags||''].join(' ').toLowerCase().includes(S.search.toLowerCase());
    return mc&&ms;
  });
  const grid=document.getElementById('pgrid');
  if(!fl.length){grid.innerHTML=`<div class="card empty" style="grid-column:1/-1"><div class="empty-box"><div class="empty-box-inner"></div></div><h3>${S.products.length===0?'No products yet':'No results found'}</h3><p>${S.products.length===0?'Products added by admin will appear here.':'Try a different search or filter.'}</p></div>`;return;}
  grid.innerHTML=fl.map((p,i)=>{
    const d=p.discount||0,fp=dp(p.price,d);
    return`<div class="pcard${p.featured?' feat':''} fadeUp" style="animation-delay:${i*.04}s">
    <div class="pcard-media">${pMedia(p)}
      <div class="badges-r">${p.featured?'<span class="tag t-g">Featured</span>':''}<span class="tag t-p">${p.category}</span></div>
      <div class="badges-l">${p.stock<=5&&p.stock>0?'<span class="tag t-r">Low Stock</span>':''}${p.stock===0?'<span class="tag t-r">Out of Stock</span>':''}</div>
      ${d>0?`<div class="disc-bar">${d}% OFF</div>`:''}
    </div>
    <div class="pcard-body">
      <div class="pcard-tags">${rTags(p.tags)}</div>
      <div class="pcard-name">${p.name}</div>
      <div class="pcard-desc">${p.description}</div>
      <div class="price-row">
        <div class="p-price">${fmt(fp)}</div>
        ${d>0?`<div class="p-orig">${fmt(p.price)}</div><div class="p-disc">-${d}%</div>`:''}
        <div class="p-stock">${p.stock} left</div>
      </div>
      <div class="pcard-acts">
        <button class="btn-ac" onclick="addCart('${p.id}')" ${p.stock===0?'disabled':''}>
          ${p.stock===0?'Out of Stock':'Add to Cart'}
        </button>
        <button class="btn-vw" onclick="viewP('${p.id}')">View</button>
      </div>
    </div>
    </div>`;
  }).join('');
}
function doCat(c){S.cat=c;rStore();}
function doSearch(v){S.search=v;rStore();}

function viewP(id){S.selProd=S.products.find(p=>p.id===id);goPage('product');}
function rDetail(){
  const p=S.selProd;if(!p)return;
  const d=p.discount||0,fp=dp(p.price,d);
  const m=document.getElementById('d-media');
  if(p.photo&&p.photo.length>4)m.innerHTML=`<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover"/>`;
  else m.innerHTML=`<div class="det-ph">${initLetter(p.name)}</div>`;
  document.getElementById('d-tags').innerHTML=rTags((p.featured?'Featured,':'')+p.category+(p.tags?','+p.tags:''));
  document.getElementById('d-name').textContent=p.name;
  document.getElementById('d-price').textContent=fmt(fp);
  const op=document.getElementById('d-orig'),sv=document.getElementById('d-save');
  if(d>0){op.textContent=fmt(p.price);op.style.display='';sv.textContent='Save '+d+'%';sv.style.display='';}
  else{op.style.display='none';sv.style.display='none';}
  document.getElementById('d-desc').textContent=p.description;
  document.getElementById('d-stock').textContent=p.stock+' units available';
  const ab=document.getElementById('d-add');
  ab.onclick=()=>{addCart(p.id);goPage('store');};
  ab.disabled=p.stock===0;ab.textContent=p.stock===0?'Out of Stock':'Add to Cart';ab.style.opacity=p.stock===0?'.43':'';
}

async function addCart(id){
  if(!S.user){
    const u=await api("POST","/users",{session_id:sid,name:localStorage.getItem("nx-name")||"Guest"});
    if(u&&u.id){S.user=u;localStorage.setItem("nx-uid",u.id);localStorage.setItem("nx-name",u.name);}
    else{toast("Session error, please refresh","err");return;}
  }
  const p=S.products.find(x=>x.id===id);if(!p||p.stock===0)return;
  const r=await api("POST","/cart",{user_id:S.user.id,product_id:id});
  if(r&&r.error){toast(r.error,"err");return;}
  await loadCart();toast(p.name+" added to cart","ok");
}
async function rmItem(itemId){await api('DELETE','/cart/'+itemId);await loadCart();rCart();}
async function updQty(itemId,delta){
  const item=S.cart.find(i=>i.id===itemId);if(!item)return;
  const nq=item.quantity+delta;
  if(nq<=0){await rmItem(itemId);return;}
  await api('PUT','/cart/'+itemId,{quantity:nq});await loadCart();rCart();
}
function rCart(){
  const cb=document.getElementById('cart-body');
  const cnt=S.cart.reduce((s,i)=>s+i.quantity,0);
  const total=S.cart.reduce((s,i)=>s+i.price*i.quantity,0);
  const bdg=document.getElementById('cart-bdg');
  if(bdg){bdg.textContent=cnt+' item'+(cnt!==1?'s':'');bdg.classList.toggle('hidden',cnt===0);}
  if(!S.cart.length){cb.innerHTML=`<div class="card empty"><div class="empty-box"><div class="empty-box-inner"></div></div><h3>Your cart is empty</h3><p>Browse our store and add items you like</p><button class="btn btn-p" style="margin:0 auto" onclick="goPage('store')">Browse Products</button></div>`;return;}
  cb.innerHTML=S.cart.map(item=>`
  <div class="card citem fadeUp">
    <div class="citem-th">${item.image&&item.image.length>4?`<img src="${item.image}" alt=""/>`:initLetter(item.name)}</div>
    <div class="citem-info"><div class="citem-name">${item.name}</div><div class="citem-sub">${fmt(item.price)} each</div></div>
    <div class="qty-row">
      <button class="qb" onclick="updQty(${item.id},-1)">&#8722;</button>
      <span class="qn">${item.quantity}</span>
      <button class="qb" onclick="updQty(${item.id},1)">+</button>
    </div>
    <div class="citem-tot">${fmt(item.price*item.quantity)}</div>
    <button class="rm" onclick="rmItem(${item.id})">&#215;</button>
  </div>`).join('')+`
  <div class="card csumm fadeUp">
    <div class="sum-row"><span style="color:var(--sub);font-size:14px">Total &mdash; ${cnt} item${cnt!==1?'s':''}</span><span class="sum-tot">${fmt(total)}</span></div>
    <div class="order-stack">
      <button class="o-wa" onclick="oWa()">Order via WhatsApp</button>
      <button class="o-ph" onclick="doPhone()">Call to Order</button>
      <button class="o-em" onclick="oEmail()">Send Order by Email</button>
    </div>
  </div>`;
}

function doWa(){window.open(`https://wa.me/${S.settings.whatsapp.replace(/\D/g,'')}?text=Hello!%20I%27d%20like%20to%20make%20an%20enquiry.`,'_blank');}
function doPhone(){window.open('tel:'+S.settings.phone,'_blank');}
function doEmail(){window.open(`mailto:${S.settings.email}?subject=Product%20Enquiry`,'_blank');}
function oWa(){if(!S.cart.length)return;const lines=S.cart.map(i=>`${i.quantity}x ${i.name} @ ${fmt(i.price)}`).join('\n');const total=S.cart.reduce((s,i)=>s+i.price*i.quantity,0);window.open(`https://wa.me/${S.settings.whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(`Order:\n${lines}\n\nTotal: ${fmt(total)}`)}`, '_blank');}
function oEmail(){if(!S.cart.length)return;const lines=S.cart.map(i=>`${i.quantity}x ${i.name} @ ${fmt(i.price)}`).join('\n');const total=S.cart.reduce((s,i)=>s+i.price*i.quantity,0);window.open(`mailto:${S.settings.email}?subject=New Order&body=${encodeURIComponent(`Order:\n${lines}\n\nTotal: ${fmt(total)}`)}`, '_blank');}

function adminLogin(){api('POST','/admin/login',{password:document.getElementById('adm-pass').value}).then(r=>{if(r.success){S.adminLoggedIn=true;showAdm();}else{const e=document.getElementById('adm-err');e.classList.remove('hidden');setTimeout(()=>e.classList.add('hidden'),2400);}});}
function adminLogout(){api('POST','/admin/logout').then(()=>{S.adminLoggedIn=false;document.getElementById('adm-login').classList.remove('hidden');document.getElementById('adm-panel').classList.add('hidden');document.getElementById('adm-pass').value='';});}
function rAdmin(){if(S.adminLoggedIn){document.getElementById('adm-login').classList.add('hidden');showAdm();}else{document.getElementById('adm-login').classList.remove('hidden');document.getElementById('adm-panel').classList.add('hidden');}}
function showAdm(){document.getElementById('adm-login').classList.add('hidden');document.getElementById('adm-panel').classList.remove('hidden');document.getElementById('adm-sub').textContent=S.settings.name;loadStats();setTab(S.adminTab);}
async function loadStats(){const st=await api('GET','/admin/stats');document.getElementById('stats-g').innerHTML=[{v:st.users||0,l:'USERS'},{v:st.products||0,l:'PRODUCTS'},{v:st.cart_items||0,l:'CART ITEMS'},{v:fmt(st.potential_revenue||0),l:'POTENTIAL REV'}].map(s=>`<div class="card scard"><div class="sval" style="${String(s.v).length>7?'font-size:14px':''}">${s.v}</div><div class="slbl">${s.l}</div></div>`).join('');}
function setTab(t){S.adminTab=t;S.editProd=null;S.showForm=false;['products','settings','carts'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('on',x===t));const tb=document.getElementById('tab-body');if(t==='products')tb.innerHTML=rTabP();if(t==='settings')tb.innerHTML=rTabS();if(t==='carts'){tb.innerHTML='<p style="color:var(--muted);padding:14px">Loading...</p>';loadCarts();}}

// Products tab
function rTabP(){return`<div style="display:flex;justify-content:flex-end;margin-bottom:13px"><button class="btn btn-p" onclick="toggleForm()">+ Add Product</button></div>${S.showForm||S.editProd?rPForm(S.editProd):''}${S.products.length===0?`<div class="card empty"><div class="empty-box"><div class="empty-box-inner"></div></div><h3>No products yet</h3><p>Click "Add Product" to add your first product</p></div>`:''}${S.products.map(p=>`<div class="card ap"><div class="ap-th">${p.photo&&p.photo.length>4?`<img src="${p.photo}" alt=""/>`:`${initLetter(p.name)}`}</div><div class="ap-info"><div class="ap-name">${p.name}${p.featured?' &mdash; Featured':''}</div><div class="ap-meta">${p.category}${p.tags?' | '+p.tags:''} | ${p.stock} in stock${p.discount>0?' | '+p.discount+'% off':''}</div></div><div class="ap-price">${fmt(p.price)}</div><div class="ap-btns"><button class="btn btn-ph" style="padding:6px 12px;font-size:12px" onclick="startEdit('${p.id}')">Edit</button><button class="btn btn-red" style="padding:6px 12px;font-size:12px" onclick="delP('${p.id}')">Delete</button></div></div>`).join('')}`;}

function rPForm(p){const e=!!p;return`<div class="card fpanel"><div class="ftitle">${e?'EDIT PRODUCT':'NEW PRODUCT'}</div><div class="fg"><div class="fl"><label>Name *</label><input id="f-n" value="${e?p.name:''}" placeholder="Product name"/></div><div class="fl"><label>Category</label><input id="f-c" value="${e?p.category:''}" placeholder="e.g. Electronics"/></div><div class="fl"><label>Price *</label><input id="f-p" type="number" min="0" value="${e?p.price:''}" placeholder="e.g. 25000"/></div><div class="fl"><label>Stock</label><input id="f-s" type="number" min="0" value="${e?p.stock:'10'}"/></div><div class="fl"><label>Discount %</label><input id="f-d" type="number" min="0" max="100" value="${e?p.discount||0:0}"/></div><div class="fl fw"><label>Tags <span class="hint">comma-separated, e.g. New, Best Seller, Sale</span></label><input id="f-t" value="${e?p.tags||'':''}" placeholder="New, Best Seller, Sale"/></div><div class="fl fw"><label>Description</label><textarea id="f-de" rows="3">${e?p.description||'':''}</textarea></div><div class="fl fw"><label>Product Photo <span class="hint">optional, max 2MB</span></label><div class="urow"><div class="uprev" id="pprev">${e&&p.photo&&p.photo.length>4?`<img src="${p.photo}" alt=""/>`:initLetter(e?p.name:'?')}</div><div style="display:flex;flex-direction:column;gap:6px"><button type="button" class="ubtn" onclick="trigPhoto()">Upload Photo</button><input type="file" id="photo-in" accept="image/*" style="display:none" onchange="handlePhoto(this)"/>${e&&p.photo&&p.photo.length>4?`<button type="button" class="urbtn" onclick="clearPhoto()">Remove</button>`:''}</div><span class="hint" style="align-self:center">JPG, PNG, WebP</span></div></div><div class="fl"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px"><input type="checkbox" id="f-f" ${e&&p.featured?'checked':''}/> Mark as Featured</label></div></div><div class="factions"><button class="btn btn-p" onclick="${e?`sEdit('${p.id}')`:'sNew()'}">${e?'Update Product':'Save Product'}</button><button class="btn btn-g" onclick="cancelF()">Cancel</button></div></div>`;}

let _ph='';
function trigPhoto(){document.getElementById('photo-in').click();}
function handlePhoto(input){const f=input.files[0];if(!f)return;if(f.size>2*1024*1024){toast('Photo must be under 2MB','err');return;}const r=new FileReader();r.onload=e=>{_ph=e.target.result;const pv=document.getElementById('pprev');if(pv)pv.innerHTML=`<img src="${_ph}" style="width:100%;height:100%;object-fit:contain"/>`;};r.readAsDataURL(f);}
function clearPhoto(){_ph='__CLEAR__';const pv=document.getElementById('pprev');if(pv)pv.textContent='?';}
function getF(){return{name:document.getElementById('f-n')?.value.trim()||'',category:document.getElementById('f-c')?.value.trim()||'General',price:parseFloat(document.getElementById('f-p')?.value)||0,stock:parseInt(document.getElementById('f-s')?.value)||0,discount:parseFloat(document.getElementById('f-d')?.value)||0,tags:document.getElementById('f-t')?.value.trim()||'',description:document.getElementById('f-de')?.value.trim()||'',featured:document.getElementById('f-f')?.checked||false,photo:_ph==='__CLEAR__'?'':(_ph||undefined)};}
function toggleForm(){_ph='';S.showForm=!S.showForm;S.editProd=null;document.getElementById('tab-body').innerHTML=rTabP();scrollF();}
function startEdit(id){_ph='';S.editProd={...S.products.find(p=>p.id===id)};S.showForm=false;document.getElementById('tab-body').innerHTML=rTabP();scrollF();}
function cancelF(){_ph='';S.showForm=false;S.editProd=null;document.getElementById('tab-body').innerHTML=rTabP();}
function scrollF(){setTimeout(()=>document.querySelector('.fpanel')?.scrollIntoView({behavior:'smooth',block:'start'}),60);}
async function sNew(){const d=getF();if(!d.name||!d.price){toast('Name and price are required','err');return;}const r=await api('POST','/products',d);if(r.id){S.products.unshift(r);S.showForm=false;_ph='';toast(r.name+' added','ok');document.getElementById('tab-body').innerHTML=rTabP();loadStats();}else toast(r.error||'Failed','err');}
async function sEdit(id){const d=getF();if(!d.name||!d.price){toast('Name and price are required','err');return;}const r=await api('PUT','/products/'+id,d);if(r.id){S.products=S.products.map(p=>p.id===id?r:p);S.editProd=null;_ph='';toast(r.name+' updated','ok');document.getElementById('tab-body').innerHTML=rTabP();}else toast(r.error||'Failed','err');}
async function delP(id){if(!confirm('Delete this product?'))return;const r=await api('DELETE','/products/'+id);if(r.success){S.products=S.products.filter(p=>p.id!==id);toast('Product deleted','ok');document.getElementById('tab-body').innerHTML=rTabP();loadStats();}}

// Settings tab
function rTabS(){const s=S.settings;const presets=['#C27A0A','#D4450C','#7C3AED','#0284C7','#059669','#DB2777','#374151'];return`<div class="card spanel"><div class="orb" style="color:var(--t);font-size:10px;letter-spacing:1px;margin-bottom:20px">SITE CONFIGURATION</div><div class="sg"><div class="fl"><label>Store Name</label><input id="s-n" value="${s.name}"/></div><div class="fl"><label>Tagline</label><input id="s-tg" value="${s.tagline}"/></div><div class="fl"><label>Phone Number</label><input id="s-ph" value="${s.phone}"/></div><div class="fl"><label>WhatsApp Number</label><input id="s-wa" value="${s.whatsapp}" placeholder="+2348000000000"/></div><div class="fl"><label>Address</label><input id="s-ad" value="${s.address}"/></div><div class="fl"><label>Email</label><input id="s-em" value="${s.email}"/></div><div class="fl"><label>Currency Symbol <span class="hint">e.g. $ or leave blank</span></label><input id="s-cu" value="${s.currency||''}" placeholder="e.g. $" style="max-width:110px"/></div><div class="fl"><label>Theme Colour</label><div style="display:flex;gap:8px;align-items:center"><input type="color" id="s-cp" value="${s.theme}" oninput="liveT(this.value)"/><input id="s-ch" value="${s.theme}" placeholder="#C27A0A" oninput="liveT(this.value)" style="max-width:115px"/></div><div class="cdots">${presets.map(c=>`<button class="cdot${s.theme.toLowerCase()===c.toLowerCase()?' sel':''}" style="background:${c}" onclick="pickC('${c}')"></button>`).join('')}</div></div><div class="fl" style="grid-column:1/-1"><label>Store Logo <span class="hint">PNG or SVG, max 1MB, shown in navbar and homepage</span></label><div class="urow" style="margin-top:6px"><div class="uprev" id="lprev" style="width:62px;height:62px">${s.logo&&s.logo.length>4?`<img src="${s.logo}" alt="logo"/>`:(s.name[0]||'N').toUpperCase()}</div><div style="display:flex;flex-direction:column;gap:6px"><button type="button" class="ubtn" onclick="trigLogo()">Upload Logo</button><input type="file" id="logo-in" accept="image/*" style="display:none" onchange="handleLogo(this)"/>${s.logo&&s.logo.length>4?`<button type="button" class="urbtn" onclick="rmLogo()">Remove</button>`:''}</div></div></div></div><div id="logo-data" style="display:none">${s.logo||''}</div><button class="btn btn-p" id="save-btn" style="margin-top:18px;padding:11px 24px" onclick="saveS()">Save Settings</button></div>`;}

let _lg='';
function trigLogo(){document.getElementById('logo-in').click();}
function handleLogo(input){const f=input.files[0];if(!f)return;if(f.size>1024*1024){toast('Logo must be under 1MB','err');return;}const r=new FileReader();r.onload=e=>{_lg=e.target.result;const pv=document.getElementById('lprev');if(pv)pv.innerHTML=`<img src="${_lg}" alt="logo"/>`;document.getElementById('logo-data').textContent=_lg;};r.readAsDataURL(f);}
function rmLogo(){_lg='';const pv=document.getElementById('lprev');if(pv)pv.textContent=(S.settings.name[0]||'N').toUpperCase();document.getElementById('logo-data').textContent='';}
function liveT(c){if(/^#[0-9A-Fa-f]{6}$/.test(c)){applyTheme(c);const cp=document.getElementById('s-cp'),ch=document.getElementById('s-ch');if(cp)cp.value=c;if(ch)ch.value=c;}}
function pickC(c){liveT(c);document.querySelectorAll('.cdot').forEach(d=>d.classList.toggle('sel',d.style.background===c));}
async function saveS(){
  const logo=_lg||(document.getElementById('logo-data')?.textContent)||S.settings.logo;
  const data={name:document.getElementById('s-n')?.value.trim()||S.settings.name,tagline:document.getElementById('s-tg')?.value.trim()||S.settings.tagline,phone:document.getElementById('s-ph')?.value.trim()||S.settings.phone,whatsapp:document.getElementById('s-wa')?.value.trim()||S.settings.whatsapp,address:document.getElementById('s-ad')?.value.trim()||S.settings.address,email:document.getElementById('s-em')?.value.trim()||S.settings.email,currency:document.getElementById('s-cu')?.value.trim()||S.settings.currency,theme:document.getElementById('s-ch')?.value.trim()||S.settings.theme,logo};
  const r=await api('POST','/settings',data);
  if(r.success){S.settings={...S.settings,...data};_lg='';applyTheme(data.theme);updNav();document.getElementById('adm-sub').textContent=data.name;const btn=document.getElementById('save-btn');if(btn){const orig=btn.textContent;btn.textContent='Saved';setTimeout(()=>btn.textContent=orig,2000);}toast('Settings saved','ok');}
  else toast('Failed to save','err');
}

// Carts tab
async function loadCarts(){const carts=await api('GET','/admin/carts');S.adminCarts=Array.isArray(carts)?carts:[];const tb=document.getElementById('tab-body');const active=S.adminCarts.filter(e=>e.items&&e.items.length);if(!active.length){tb.innerHTML=`<div class="card empty"><div class="empty-box"><div class="empty-box-inner"></div></div><h3>No active carts</h3><p>User carts will appear here as customers shop</p></div>`;return;}tb.innerHTML=active.map(entry=>`<div class="card uc fadeUp"><div class="uc-hd"><div style="display:flex;align-items:center;gap:9px"><div class="uc-av">${initLetter(entry.user.name)}</div><div><div style="font-weight:700;color:var(--text);font-size:13px">${entry.user.name}</div><div style="color:var(--muted);font-size:11px">${entry.user.created_at} &mdash; ${entry.items.length} type${entry.items.length!==1?'s':''}</div></div></div><div class="orb" style="color:var(--t);font-weight:700;font-size:13px">${fmt(entry.total)}</div></div>${entry.items.map(i=>`<div class="uc-row"><div style="width:26px;height:26px;border-radius:5px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:9px;font-weight:700;color:var(--muted);flex-shrink:0">${initLetter(i.name)}</div><span style="flex:1;color:var(--text);font-size:13px">${i.name}</span><span style="color:var(--muted);font-size:12px">x${i.quantity}</span><span style="font-weight:700;font-size:12px;color:var(--t)">${fmt(i.price*i.quantity)}</span></div>`).join('')}</div>`).join('');}

function toast(msg,type='ok'){const tc=document.getElementById('toast');const el=document.createElement('div');el.className='ti ti-'+type;el.textContent=msg;tc.appendChild(el);setTimeout(()=>{el.style.transition='.25s';el.style.opacity='0';el.style.transform='translateX(110%)';setTimeout(()=>el.remove(),270);},2500);}

init().catch(console.error);
</script>
</body>
</html>
